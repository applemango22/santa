<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>김비서를 소개합니다</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --glass-bg:      rgba(255, 255, 255, 0.58);
      --glass-border:  rgba(255, 255, 255, 0.76);
      --glass-shadow:  0 8px 48px rgba(79, 70, 229, 0.18), 0 2px 8px rgba(0,0,0,0.06);
      --text-1:        #0F172A;
      --text-2:        #475569;
      --text-3:        #94A3B8;
      --accent:        #4F46E5;
      --accent-from:   #4F46E5;
      --accent-to:     #7C3AED;
      --surface:       rgba(255, 255, 255, 0.38);
      --surface-border:rgba(255, 255, 255, 0.55);
      --surface-hover: rgba(255, 255, 255, 0.58);
      --badge-bg:      rgba(79, 70, 229, 0.12);
      --badge-border:  rgba(79, 70, 229, 0.22);
      --toggle-bg:     rgba(255, 255, 255, 0.58);
      --toggle-border: rgba(255, 255, 255, 0.82);
      --icon-bg:       rgba(255, 255, 255, 0.38);
    }

    [data-theme="dark"] {
      --glass-bg:      rgba(255, 255, 255, 0.055);
      --glass-border:  rgba(255, 255, 255, 0.1);
      --glass-shadow:  0 8px 48px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.3);
      --text-1:        #E2E2E2;
      --text-2:        #94A3B8;
      --text-3:        #64748B;
      --accent:        #818CF8;
      --accent-from:   #6366F1;
      --accent-to:     #8B5CF6;
      --surface:       rgba(255, 255, 255, 0.04);
      --surface-border:rgba(255, 255, 255, 0.08);
      --surface-hover: rgba(255, 255, 255, 0.09);
      --badge-bg:      rgba(129, 140, 248, 0.14);
      --badge-border:  rgba(129, 140, 248, 0.25);
      --toggle-bg:     rgba(255, 255, 255, 0.08);
      --toggle-border: rgba(255, 255, 255, 0.14);
      --icon-bg:       rgba(255, 255, 255, 0.07);
    }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* ── 배경 ── */
    .bg {
      position: fixed; inset: 0; z-index: -2;
      background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #4facfe, #00f2fe);
      background-size: 400% 400%;
      animation: gradShift 18s ease infinite;
      transition: background 0.6s, opacity 0.6s;
    }

    [data-theme="dark"] .bg {
      background: #0f0f23;
      animation: none;
    }

    @keyframes gradShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ── 글로우 블롭 ── */
    .blob {
      position: fixed; border-radius: 50%; z-index: -1;
      filter: blur(72px); pointer-events: none;
      animation: blobFloat 12s ease-in-out infinite;
    }

    .blob-1 {
      width: 580px; height: 580px;
      background: radial-gradient(circle, rgba(102,126,234,.55), rgba(118,75,162,.35));
      top: -160px; left: -160px;
    }
    .blob-2 {
      width: 460px; height: 460px;
      background: radial-gradient(circle, rgba(240,147,251,.48), rgba(245,87,108,.28));
      bottom: -120px; right: -120px;
      animation-delay: -4s;
    }
    .blob-3 {
      width: 360px; height: 360px;
      background: radial-gradient(circle, rgba(79,172,254,.45), rgba(0,242,254,.25));
      top: 40%; right: 8%;
      animation-delay: -8s;
    }

    [data-theme="dark"] .blob-1 { background: radial-gradient(circle, rgba(79,70,229,.25), transparent 70%); }
    [data-theme="dark"] .blob-2 { background: radial-gradient(circle, rgba(139,92,246,.18), transparent 70%); }
    [data-theme="dark"] .blob-3 { background: radial-gradient(circle, rgba(59,130,246,.14), transparent 70%); }

    @keyframes blobFloat {
      0%,100% { transform: translate(0,0) scale(1); }
      33%      { transform: translate(22px,-32px) scale(1.06); }
      66%      { transform: translate(-16px,20px) scale(0.93); }
    }

    /* ── 테마 토글 ── */
    .theme-toggle {
      position: fixed; top: 20px; right: 24px; z-index: 999;
      width: 48px; height: 48px; border-radius: 50%;
      border: 1px solid var(--toggle-border);
      background: var(--toggle-bg);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.25s, box-shadow 0.25s;
      box-shadow: 0 4px 16px rgba(0,0,0,.12);
    }
    .theme-toggle:hover { transform: scale(1.12) rotate(18deg); box-shadow: 0 6px 24px rgba(0,0,0,.18); }

    /* ── 카드 ── */
    .container {
      max-width: 620px; width: 100%;
      animation: fadeUp .65s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-card {
      background: var(--glass-bg);
      backdrop-filter: blur(26px); -webkit-backdrop-filter: blur(26px);
      border: 1px solid var(--glass-border);
      border-radius: 28px; padding: 60px 52px;
      box-shadow: var(--glass-shadow);
      text-align: center;
      transition: background .4s, border-color .4s, box-shadow .4s;
    }

    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--badge-bg); color: var(--accent);
      font-size: 11px; font-weight: 700; padding: 6px 16px;
      border-radius: 100px; margin-bottom: 28px;
      letter-spacing: 1px; text-transform: uppercase;
      border: 1px solid var(--badge-border);
      transition: all .3s;
    }

    h1 {
      font-size: 2.8rem; font-weight: 800;
      color: var(--text-1); line-height: 1.15;
      margin-bottom: 16px; letter-spacing: -.5px;
      transition: color .3s;
    }
    h1 .hl { color: var(--accent); }

    .subtitle {
      font-size: 1rem; color: var(--text-2);
      line-height: 1.75; margin-bottom: 44px;
      transition: color .3s;
    }

    .features { display: flex; flex-direction: column; gap: 12px; margin-bottom: 44px; text-align: left; }

    .feature {
      display: flex; align-items: center; gap: 16px;
      background: var(--surface); border: 1px solid var(--surface-border);
      border-radius: 16px; padding: 18px 20px;
      transition: all .22s ease;
    }
    .feature:hover {
      background: var(--surface-hover);
      transform: translateX(5px);
      border-color: rgba(129,140,248,.35);
      box-shadow: 0 4px 20px rgba(79,70,229,.1);
    }
    [data-theme="dark"] .feature:hover {
      box-shadow: 0 4px 20px rgba(129,140,248,.1);
    }

    .feature-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
      background: var(--icon-bg);
      backdrop-filter: blur(8px);
    }

    .feature-title { font-size: .9rem; font-weight: 700; color: var(--text-1); margin-bottom: 4px; transition: color .3s; }
    .feature-desc  { font-size: .82rem; color: var(--text-2); line-height: 1.55; transition: color .3s; }

    .cta-btn {
      display: inline-flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      color: white; text-decoration: none;
      padding: 17px 40px; border-radius: 16px;
      font-size: 1rem; font-weight: 700; letter-spacing: -.2px;
      transition: all .25s; position: relative; overflow: hidden;
      box-shadow: 0 4px 24px rgba(79,70,229,.45);
    }
    .cta-btn::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.18) 0%, transparent 55%);
      border-radius: inherit; pointer-events: none;
    }
    .cta-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 36px rgba(79,70,229,.55); }
    .cta-btn:active { transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <button class="theme-toggle" id="themeToggle" title="테마 전환" aria-label="테마 전환">🌙</button>

  <div class="container">
    <div class="hero-card">
      <span class="badge">✦ AI 업무 비서</span>
      <h1><span class="hl">김비서</span>를 소개합니다</h1>
      <p class="subtitle">
        스마트한 업무 관리로 팀의 생산성을 높여주는<br>
        당신만의 AI 업무 비서입니다.
      </p>
      <div class="features">
        <div class="feature">
          <div class="feature-icon">📋</div>
          <div>
            <div class="feature-title">할 일 &amp; 업무 관리</div>
            <div class="feature-desc">우선순위별 업무를 한눈에 정리하고, 진행 상황을 실시간으로 추적합니다.</div>
          </div>
        </div>
        <div class="feature">
          <div class="feature-icon">📅</div>
          <div>
            <div class="feature-title">주간 일정 자동 정리</div>
            <div class="feature-desc">월요일부터 금요일까지의 미팅과 일정을 깔끔하게 정리해드립니다.</div>
          </div>
        </div>
        <div class="feature">
          <div class="feature-icon">📊</div>
          <div>
            <div class="feature-title">프로젝트 &amp; 매출 현황 분석</div>
            <div class="feature-desc">진행 중인 프로젝트 달성률과 매출 데이터를 시각적으로 파악합니다.</div>
          </div>
        </div>
      </div>
      <a href="dashboard.html" class="cta-btn">내 대시보드 보기 →</a>
    </div>
  </div>

  <script>
    const html = document.documentElement;
    const btn  = document.getElementById('themeToggle');
    function applyTheme(t) {
      html.setAttribute('data-theme', t);
      btn.textContent = t === 'dark' ? '☀️' : '🌙';
    }
    applyTheme(localStorage.getItem('kim-theme') || 'light');
    btn.addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      localStorage.setItem('kim-theme', next);
      applyTheme(next);
    });
  </script>
</body>
</html>
